body:
  text: 宗慈孫那惠壽開法華經主比丘法景維那惠雲金像主比丘惠那惠海彌勒像開明主比丘法昕那惠景石像開明主比丘惠雲邑主道旻陽郡浬陽縣馬允寺香卅七人等以大統十七日造石像之次記其造像之日此寺置夫至理難尋妙言音形凡之神王宮託生迦維有緣蒙度覲尊顏自大人潛輝千有餘載道俗卅七人等仰慕能人之去速慈氏之遲敬造石像一區已邀三會之初大統十七年太歲辛未四月甲戊朔廿三日丙申道俗等皆殖靈根於曩劫之始桑穎條於雲霄之表棄錢財如土施惠為神用共相仰為帝王永康百僚長者道俗過去見在師僧父母眷屬知識敬造釋迦金像一區石像一區彌勒像一區法華經一部冀契菩提因果慈氏世登先首為法界眾生普同此福其辭曰善逝去其唯遠捨識迷仰邀慈神化迹顧瞻未識顏色化賢劫已過一六有化養育化下悟道結緣先契都邑子樂道邑子宗慈孫邑子比丘惠景邑子比丘惠偘邑子胡祖生邑子邑子比丘惠海邑子比丘惠邑子趙賢珍邑子王通邑子比丘惠雲邑子比丘惠慕邑子楊永邑子楊惠珍邑子比丘僧成邑子比丘道凝邑子秦法明邑子邑子比丘道猛邑子沙彌道照邑子趙三賢邑子劉道珍邑子比丘惠隱邑子王外孫邑子何道徹邑子王鸞邑子比丘法景邑子康伏居邑子吳永徹邑子陳保一邑子比丘法昕邑子趙賢岳邑子楊德邑子宗顯邑子比丘僧榮邑子比丘惠智邑子楊碩琳邑子楊光邑子比丘僧邑子宗伯孫邑子楊東生邑子楊天紹
